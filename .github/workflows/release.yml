name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      pre_release:
        description: "Create a beta tag only (e.g. v1.4.5-beta.1). No GitHub Release."
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: docker/docker-agent-action
          ref: ${{ github.workflow_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Build action
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Calculate new version
        id: version
        env:
          BUMP_TYPE: ${{ inputs.version_bump }}
          PRE_RELEASE: ${{ inputs.pre_release }}
        run: |
          # Get the latest release tag — exclude pre-release tags (e.g. -beta.*) so they
          # don't interfere with base version detection.
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing version tags found, starting at v0.0.0"
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            echo "Current version: v${MAJOR}.${MINOR}.${PATCH}"
          fi

          # Bump the chosen segment
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          # Collision avoidance on the base semver (run before appending beta suffix).
          while git rev-parse "$NEW_VERSION" >/dev/null 2>&1; do
            echo "Tag $NEW_VERSION already exists, bumping patch..."
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          done

          if [ "$PRE_RELEASE" = "true" ]; then
            # Find the highest existing beta number for this base version and increment.
            # Strip prefix first and sort numerically to avoid git versionsort ambiguity
            # with double-digit suffixes (e.g. -beta.10 vs -beta.9).
            BETA_NUM=$(git tag -l "${NEW_VERSION}-beta.*" \
              | sed 's/.*-beta\.//' \
              | sort -rn \
              | head -n1)
            if [ -n "$BETA_NUM" ]; then
              BETA_NUM=$((BETA_NUM + 1))
            else
              BETA_NUM=1
            fi
            NEW_VERSION="${NEW_VERSION}-beta.${BETA_NUM}"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "previous=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (previous: ${LATEST_TAG:-none})"

      # CI cannot push commits to main (branch protection), and dist/ is
      # gitignored there. Instead, create a single commit containing the built
      # dist/ on a throwaway staging branch, tag that commit, and delete the
      # branch — main stays clean while the tagged release commit ships dist/.
      - name: Create release commit
        working-directory: ${{ github.workspace }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          # optional PAT; falls back to github.token
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          set -e

          if [ ! -f "$GITHUB_WORKSPACE/dist/main.js" ]; then
            echo "::error::dist/main.js is missing — build may have failed"
            exit 1
          fi
          if [ ! -f "$GITHUB_WORKSPACE/dist/signed-commit.js" ]; then
            echo "::error::dist/signed-commit.js is missing — CLI build may have failed"
            exit 1
          fi

          # Create staging branch and release commit (dist/ only)
          STAGING_BRANCH="release-staging/${VERSION}"
          trap 'gh api -X DELETE "repos/docker/docker-agent-action/git/refs/heads/${STAGING_BRANCH}" >/dev/null 2>&1 || true' EXIT
          # NOTE: use `find dist/ -type f` (relative path) NOT `find "$GITHUB_WORKSPACE/dist/" -type f`.
          # signed-commit uses the paths verbatim as git file paths in the GitHub API, which
          # requires repo-root-relative paths.  Absolute paths cause a cryptic
          # "A path was requested for deletion which does not exist" GraphQL error.
          RELEASE_SHA=$(find dist/ -type f 2>/dev/null | \
            GITHUB_TOKEN="${GH_TOKEN}" node "$GITHUB_WORKSPACE/dist/signed-commit.js" \
              --repo docker/docker-agent-action \
              --branch "$STAGING_BRANCH" \
              --base-ref main \
              --force \
              --message "release: ${VERSION}" \
              --add-stdin)

          echo "Release commit: $RELEASE_SHA"

          # Create the tag via API (no git push needed)
          gh api "repos/docker/docker-agent-action/git/refs" \
            -f "ref=refs/tags/${VERSION}" \
            -f "sha=${RELEASE_SHA}" > /dev/null

          echo "✅ Tag ${VERSION} created pointing to ${RELEASE_SHA}"

      - name: Create GitHub Release
        if: ${{ !inputs.pre_release }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PREVIOUS: ${{ steps.version.outputs.previous }}
          # optional PAT; falls back to github.token
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          ARGS=(--generate-notes --latest)
          if [ -n "$PREVIOUS" ]; then
            ARGS+=(--notes-start-tag "$PREVIOUS")
          fi
          gh release create "$VERSION" "${ARGS[@]}"
