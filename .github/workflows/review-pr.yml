name: PR Review

on:
  workflow_call:
    inputs:
      pr-number:
        description: "Pull request number (auto-detected if not provided)"
        required: false
        type: string
        default: ""
      comment-id:
        description: "Comment ID for reactions (auto-detected if not provided)"
        required: false
        type: string
        default: ""
      additional-prompt:
        description: "Additional instructions for the review"
        required: false
        type: string
        default: ""
      model:
        description: "Model to use (e.g., anthropic/claude-sonnet-4-5)"
        required: false
        type: string
        default: ""
      add-prompt-files:
        description: "Comma-separated list of files to append to the prompt (e.g., 'AGENTS.md,CLAUDE.md')"
        required: false
        type: string
        default: ""
      exclude-paths:
        description: 'Newline-separated list of path prefixes or glob patterns to strip from the diff before chunking. Files matching any entry are excluded from review entirely. Example: use `**/package-lock.json` to exclude lock files at any depth.'
        required: false
        type: string
        default: ''
      max-diff-lines:
        description: 'Auto-filter cap: if the diff exceeds this many lines after removing score-0 files, lowest-risk files are progressively excluded until it fits. Set to 0 to disable. Default: 3000.'
        required: false
        type: number
        default: 3000
      trigger-run-id:
        description: "Workflow run ID from pr-review-trigger.yml — used to download the event context artifact. When set, resolve-context job downloads the artifact and routes to the appropriate job."
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key (at least one API key required)"
        required: false
      OPENAI_API_KEY:
        description: "OpenAI API key (at least one API key required)"
        required: false
      GOOGLE_API_KEY:
        description: "Google API key (at least one API key required)"
        required: false
      AWS_BEARER_TOKEN_BEDROCK:
        description: "AWS Bearer token for Bedrock (at least one API key required)"
        required: false
      XAI_API_KEY:
        description: "xAI API key for Grok (at least one API key required)"
        required: false
      NEBIUS_API_KEY:
        description: "Nebius API key (at least one API key required)"
        required: false
      MISTRAL_API_KEY:
        description: "Mistral API key (at least one API key required)"
        required: false
    outputs:
      exit-code:
        description: "Exit code from the review"
        value: ${{ jobs.review.outputs.exit-code }}

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read   # download-artifact across workflow_run boundary

jobs:
  resolve-context:
    if: inputs.trigger-run-id != ''
    runs-on: ubuntu-latest
    outputs:
      trigger-event: ${{ steps.read.outputs.event-name }}
      pr-number: ${{ steps.read.outputs.pr-number }}
      pr-head-sha: ${{ steps.read.outputs.pr-head-sha }}
      comment-json: ${{ steps.read.outputs.comment-json }}
      comment-author: ${{ steps.read.outputs.comment-author }}
      comment-in-reply-to-id: ${{ steps.read.outputs.comment-in-reply-to-id }}
      comment-has-mention: ${{ steps.read.outputs.comment-has-mention }}
      comment-is-review-cmd: ${{ steps.read.outputs.comment-is-review-cmd }}
      comment-author-type: ${{ steps.read.outputs.comment-author-type }}
    steps:
      - name: Setup credentials
        uses: docker/docker-agent-action/setup-credentials@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0

      - name: Verify token for cross-run artifact download
        shell: bash
        run: |
          if [ -z "$GITHUB_APP_TOKEN" ]; then
            echo "::error::GITHUB_APP_TOKEN is not set. setup-credentials may have failed (check OIDC and AWS Secrets Manager configuration)."
            echo "::error::Cross-run artifact download requires a token with actions:read scope."
            exit 1
          fi

      - name: Download trigger context
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-review-context
          path: /tmp/context
          run-id: ${{ inputs.trigger-run-id }}
          github-token: ${{ env.GITHUB_APP_TOKEN }}

      - name: Read context
        id: read
        shell: bash
        run: |
          # Validate required artifact files exist
          if [ ! -f /tmp/context/event_name.txt ] || [ ! -f /tmp/context/pr_number.txt ]; then
            echo "::error::Required artifact files missing (event_name.txt or pr_number.txt)"
            exit 1
          fi

          echo "event-name=$(cat /tmp/context/event_name.txt)" >> $GITHUB_OUTPUT
          echo "pr-number=$(cat /tmp/context/pr_number.txt)" >> $GITHUB_OUTPUT
          if [ -f /tmp/context/pr_head_sha.txt ]; then
            echo "pr-head-sha=$(cat /tmp/context/pr_head_sha.txt)" >> $GITHUB_OUTPUT
          fi
          if [ -f /tmp/context/comment.json ]; then
            # Use heredoc output syntax — jq -c compacts JSON but comment bodies
            # can still contain literal newlines that break single-line echo.
            {
              echo 'comment-json<<COMMENT_JSON_EOF'
              jq -c '.' /tmp/context/comment.json
              echo 'COMMENT_JSON_EOF'
            } >> $GITHUB_OUTPUT
            echo "comment-author=$(jq -r '.user.login' /tmp/context/comment.json)" >> $GITHUB_OUTPUT
            echo "comment-in-reply-to-id=$(jq -r '.in_reply_to_id // empty' /tmp/context/comment.json)" >> $GITHUB_OUTPUT
            echo "comment-has-mention=$(jq -r 'if (.body | contains("@docker-agent")) then "true" else "false" end' /tmp/context/comment.json)" >> $GITHUB_OUTPUT
            echo "comment-is-review-cmd=$(jq -r 'if (.body | startswith("/review")) then "true" else "false" end' /tmp/context/comment.json)" >> $GITHUB_OUTPUT
            echo "comment-author-type=$(jq -r '.user.type // empty' /tmp/context/comment.json)" >> $GITHUB_OUTPUT
          fi

  review:
    needs: [resolve-context]
    if: |
      always() && (
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request &&
         github.event.comment.user.login != 'docker-agent' &&
         github.event.comment.user.login != 'docker-agent[bot]' &&
         github.event.comment.user.type != 'Bot' &&
         !contains(github.event.comment.body, '<!-- docker-agent-review -->') &&
         !contains(github.event.comment.body, '<!-- docker-agent-review-reply -->') &&
         !contains(github.event.comment.body, '<!-- cagent-review -->') &&
         !contains(github.event.comment.body, '<!-- cagent-review-reply -->')) ||
        (github.event_name == 'pull_request' && github.event.action != 'review_requested' && github.event.sender.type != 'Bot' && github.event.sender.login != 'docker-agent' && github.event.sender.login != 'docker-agent[bot]') ||
        (github.event_name == 'pull_request' && github.event.action == 'review_requested' && github.event.requested_reviewer.login == 'docker-agent') ||
        inputs.pr-number != '' ||
        (needs.resolve-context.result == 'success' && needs.resolve-context.outputs.trigger-event == 'pull_request')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      checks: write
    outputs:
      exit-code: ${{ steps.run-review.outputs.exit-code }}

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TRIGGER_PR_NUMBER: ${{ needs.resolve-context.outputs.pr-number }}
          INPUT_PR_NUMBER: ${{ inputs.pr-number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Priority: resolve-context output > input > pull_request event > issue_comment event
          if [ -n "$TRIGGER_PR_NUMBER" ]; then
            PR_NUMBER="$TRIGGER_PR_NUMBER"
            echo "source=trigger" >> $GITHUB_OUTPUT
          elif [ -n "$INPUT_PR_NUMBER" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            echo "source=input" >> $GITHUB_OUTPUT
          elif [ "$EVENT_NAME" = "pull_request" ] && [ -n "$EVENT_PR_NUMBER" ]; then
            PR_NUMBER="$EVENT_PR_NUMBER"
            echo "source=event" >> $GITHUB_OUTPUT
          else
            PR_NUMBER="$EVENT_ISSUE_NUMBER"
            echo "source=event" >> $GITHUB_OUTPUT
          fi
          # Validate PR number is a positive integer before downstream use
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid PR number: '$PR_NUMBER' (expected positive integer)"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Resolved PR #$PR_NUMBER"

      - name: Check for /review command
        if: github.event_name == 'issue_comment'
        id: command
        shell: bash
        env:
          ISSUE_PR: ${{ github.event.issue.pull_request.url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [ -z "$ISSUE_PR" ]; then
            echo "is_review=false" >> $GITHUB_OUTPUT
            echo "⏭️ Not a PR issue comment, skipping"
            exit 0
          fi

          if [[ "$COMMENT_BODY" =~ ^/review ]]; then
            echo "is_review=true" >> $GITHUB_OUTPUT
          else
            echo "is_review=false" >> $GITHUB_OUTPUT
            echo "⏭️ Not a /review command, skipping"
          fi

      - name: Post /review deprecation notice
        if: github.event_name == 'issue_comment' && steps.command.outputs.is_review == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
            -f body="👋 **Heads up:** The \`/review\` command is deprecated. Please re-request a review from \`docker-agent\` in the PR sidebar instead." \
            2>&1 || echo "::warning::Failed to post /review deprecation notice"

      - name: Classify trigger type
        id: trigger-type
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          INPUT_PR_NUMBER: ${{ inputs.pr-number }}
          RESOLVE_CONTEXT_RESULT: ${{ needs.resolve-context.result }}
          IS_REVIEW_COMMAND: ${{ steps.command.outputs.is_review }}
        run: |
          # Classify whether this is a user-requested or automatic review.
          # User-requested triggers bypass the draft check only; org-membership
          # check still applies on all paths via the downstream step.
          if [ "$EVENT_NAME" = "issue_comment" ] && [ "$IS_REVIEW_COMMAND" = "true" ]; then
            echo "user_requested=true" >> $GITHUB_OUTPUT
            echo "🎯 Trigger type: user-requested (issue_comment /review command)"
          elif [ "$EVENT_NAME" = "pull_request" ] && [ "$EVENT_ACTION" = "review_requested" ]; then
            echo "user_requested=true" >> $GITHUB_OUTPUT
            echo "🎯 Trigger type: user-requested (review_requested)"
          elif [ -n "$INPUT_PR_NUMBER" ]; then
            echo "user_requested=true" >> $GITHUB_OUTPUT
            echo "🎯 Trigger type: user-requested (explicit pr-number input)"
          elif [ "$RESOLVE_CONTEXT_RESULT" = "success" ]; then
            echo "user_requested=true" >> $GITHUB_OUTPUT
            echo "🎯 Trigger type: user-requested (trigger path via resolve-context)"
          else
            echo "user_requested=false" >> $GITHUB_OUTPUT
            echo "🤖 Trigger type: automatic (pull_request event)"
          fi

      - name: Check if PR is draft
        if: github.event_name != 'issue_comment' && steps.trigger-type.outputs.user_requested != 'true'
        id: draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          IS_DRAFT=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.draft')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ PR is draft, skipping auto-review"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup credentials
        if: |
          steps.command.outputs.is_review != 'false' &&
          steps.draft.outputs.skip != 'true'
        uses: docker/docker-agent-action/setup-credentials@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0

      - name: Check if org member
        id: membership
        if: |
          steps.command.outputs.is_review != 'false' &&
          steps.draft.outputs.skip != 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_SOURCE: ${{ steps.pr.outputs.source }}
          ORG: docker
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: node "$DOCKER_AGENT_ACTION_ROOT/dist/check-org-membership.js"

      - name: Create check run
        if: |
          (steps.pr.outputs.source == 'event' || steps.pr.outputs.source == 'trigger') &&
          steps.membership.outputs.is_member == 'true'
        id: create-check
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: check } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'PR Review',
              head_sha: pr.head.sha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              details_url: runUrl
            });
            core.setOutput('check-id', check.id);

      - name: Checkout PR head
        if: |
          steps.membership.outputs.is_member == 'true' &&
          steps.command.outputs.is_review != 'false' &&
          steps.draft.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.pr.outputs.number }}/head

      - name: Run PR Review
        if: |
          steps.membership.outputs.is_member == 'true' &&
          steps.command.outputs.is_review != 'false' &&
          steps.draft.outputs.skip != 'true'
        id: run-review
        continue-on-error: true
        uses: docker/docker-agent-action/review-pr@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0
        with:
          pr-number: ${{ steps.pr.outputs.number }}
          comment-id: ${{ inputs.comment-id || github.event.comment.id }}
          additional-prompt: ${{ inputs.additional-prompt }}
          add-prompt-files: ${{ inputs.add-prompt-files }}
          exclude-paths: ${{ inputs.exclude-paths }}
          max-diff-lines: ${{ inputs.max-diff-lines }}
          model: ${{ inputs.model }}
          github-token: ${{ env.GITHUB_APP_TOKEN || github.token }}
          anthropic-api-key: ${{ env.ANTHROPIC_API_KEY_FROM_SSM || secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ env.OPENAI_API_KEY_FROM_SSM || secrets.OPENAI_API_KEY }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          aws-bearer-token-bedrock: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          xai-api-key: ${{ secrets.XAI_API_KEY }}
          nebius-api-key: ${{ secrets.NEBIUS_API_KEY }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}
          skip-auth: "true"

      - name: Update check run
        if: always() && steps.create-check.outputs.check-id != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CHECK_ID: ${{ steps.create-check.outputs.check-id }}
          JOB_STATUS: ${{ job.status }}
        with:
          github-token: ${{ github.token }}
          script: |
            const conclusion = process.env.JOB_STATUS === 'cancelled' ? 'cancelled' : process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            try {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: parseInt(process.env.CHECK_ID, 10),
                status: 'completed',
                conclusion: conclusion,
                completed_at: new Date().toISOString()
              });
            } catch (error) {
              core.warning(`Failed to update check run: ${error.message}`);
            }

  reply-to-feedback:
    needs: [resolve-context]
    if: |
      always() && needs.resolve-context.result != 'failure' && (
        (github.event_name == 'pull_request_review_comment' && github.event.comment.in_reply_to_id && github.event.comment.user.login != 'docker-agent' && github.event.comment.user.type != 'Bot') ||
        (needs.resolve-context.result == 'success' && needs.resolve-context.outputs.trigger-event == 'pull_request_review_comment' && needs.resolve-context.outputs.comment-in-reply-to-id != '' && needs.resolve-context.outputs.comment-author != 'docker-agent' && needs.resolve-context.outputs.comment-author-type != 'Bot' && needs.resolve-context.outputs.comment-author != 'docker-agent[bot]')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # download cross-run artifacts

    steps:

      - name: Setup credentials
        if: inputs.trigger-run-id != ''
        uses: docker/docker-agent-action/setup-credentials@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0

      - name: Verify token for cross-run artifact download
        if: inputs.trigger-run-id != ''
        shell: bash
        run: |
          if [ -z "$GITHUB_APP_TOKEN" ]; then
            echo "::error::GITHUB_APP_TOKEN is not set. setup-credentials may have failed (check OIDC and AWS Secrets Manager configuration)."
            echo "::error::Cross-run artifact download requires a token with actions:read scope."
            exit 1
          fi

      - name: Download trigger context
        # Bypass secret-masking: instead of consuming comment-json from
        # resolve-context job outputs (which GitHub Actions silently drops when
        # the value looks like a secret), download the artifact directly.
        if: inputs.trigger-run-id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-review-context
          path: /tmp/context
          run-id: ${{ inputs.trigger-run-id }}
          github-token: ${{ env.GITHUB_APP_TOKEN }}

      - name: Parse comment context
        id: feedback
        shell: bash
        env:
          # Direct path (same-repo pull_request_review_comment)
          EVENT_COMMENT_JSON: ${{ toJSON(github.event.comment) }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -f /tmp/context/comment.json ]; then
            # Trigger path: downloaded artifact (bypasses secret-masking on job outputs)
            cp /tmp/context/comment.json /tmp/reply_comment.json
            echo "pr-number=$(cat /tmp/context/pr_number.txt || { echo '::error::pr_number.txt missing from artifact'; exit 1; })" >> $GITHUB_OUTPUT
            echo "pr-head-sha=$(cat /tmp/context/pr_head_sha.txt 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          elif [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            # Direct path: comment data from event payload
            printf '%s' "$EVENT_COMMENT_JSON" > /tmp/reply_comment.json
            echo "pr-number=$EVENT_PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr-head-sha=$EVENT_PR_HEAD_SHA" >> $GITHUB_OUTPUT
          else
            echo "::error::No comment data available"
            exit 1
          fi

          echo "comment-id=$(jq -r '.id' /tmp/reply_comment.json)" >> $GITHUB_OUTPUT
          echo "comment-author=$(jq -r '.user.login' /tmp/reply_comment.json)" >> $GITHUB_OUTPUT
          # Use // empty so null in_reply_to_id becomes empty string (not the literal "null")
          echo "parent-id=$(jq -r '.in_reply_to_id // empty' /tmp/reply_comment.json)" >> $GITHUB_OUTPUT
          jq -r '.body' /tmp/reply_comment.json > /tmp/comment_body.txt

      - name: Check if reply is to agent comment
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PARENT_ID: ${{ steps.feedback.outputs.parent-id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PARENT_ID" ]; then
            echo "is_agent=false" >> $GITHUB_OUTPUT
            echo "⏭️ Not a reply comment, skipping"
            exit 0
          fi

          parent=$(gh api "repos/$REPO/pulls/comments/$PARENT_ID") || {
            echo "::warning::Failed to fetch parent comment $PARENT_ID" >&2
            echo "is_agent=false" >> $GITHUB_OUTPUT
            exit 0
          }
          # Validate required fields exist before extracting
          if ! echo "$parent" | jq -e '.user.login and .body' > /dev/null 2>&1; then
            echo "::warning::Parent comment has unexpected structure" >&2
            echo "is_agent=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          body=$(echo "$parent" | jq -r '.body')
          parent_user_login=$(echo "$parent" | jq -r '.user.login')

          # Defense-in-depth: verify the root comment was posted by docker-agent AND
          # contains the review marker but NOT the reply marker (substring overlap).
          # The login check prevents matching human comments that happen to contain
          # the marker text (e.g., in discussions about the review system).
          # Migration window: tolerate both the new docker-agent-review markers and the
          # legacy cagent-review markers, so replies to review comments posted by the old
          # action still drive the feedback loop until those PRs close.
          if [ "$parent_user_login" = "docker-agent" ] && \
             { echo "$body" | grep -q "<!-- docker-agent-review -->" || echo "$body" | grep -q "<!-- cagent-review -->"; } && \
             ! echo "$body" | grep -q "<!-- docker-agent-review-reply -->" && \
             ! echo "$body" | grep -q "<!-- cagent-review-reply -->"; then
            echo "is_agent=true" >> $GITHUB_OUTPUT
            echo "root_comment_id=$PARENT_ID" >> $GITHUB_OUTPUT

            # Extract file path and line from the root comment for context
            echo "file_path=$(echo "$parent" | jq -r '.path // ""')" >> $GITHUB_OUTPUT
            echo "line=$(echo "$parent" | jq -r '.line // .original_line // ""')" >> $GITHUB_OUTPUT
            echo "✅ Reply is to an agent review comment"
          else
            echo "is_agent=false" >> $GITHUB_OUTPUT
            echo "⏭️ Not a reply to agent comment, skipping"
          fi

      - name: Validate root comment ID
        if: steps.check.outputs.is_agent == 'true'
        shell: bash
        env:
          ROOT_COMMENT_ID: ${{ steps.check.outputs.root_comment_id }}
        run: |
          if [ -z "$ROOT_COMMENT_ID" ]; then
            echo "::error::ROOT_COMMENT_ID is not set"
            exit 1
          fi
          if ! [[ "$ROOT_COMMENT_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::ROOT_COMMENT_ID is not a valid integer: '$ROOT_COMMENT_ID'"
            exit 1
          fi

      - name: Setup credentials
        if: steps.check.outputs.is_agent == 'true'
        uses: docker/docker-agent-action/setup-credentials@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0

      - name: Check authorization
        if: steps.check.outputs.is_agent == 'true'
        id: auth
        shell: bash
        env:
          GH_TOKEN: ${{ env.ORG_MEMBERSHIP_TOKEN }}
          ORG: docker
          USERNAME: ${{ steps.feedback.outputs.comment-author }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::ORG_MEMBERSHIP_TOKEN is not set — org membership check cannot run (ensure id-token: write permission is configured)"
            echo "authorized=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Check org membership with explicit error handling
          if ! RESPONSE=$(gh api "orgs/$ORG/members/$USERNAME" --silent -i 2>/dev/null); then
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "⏭️ API call failed or @$USERNAME is not a $ORG org member — not authorized"
            exit 0
          fi
          # Verify response starts with HTTP status line before parsing
          if ! echo "$RESPONSE" | head -1 | grep -q '^HTTP/'; then
            echo "::warning::Unexpected API response format"
            echo "authorized=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Extract status code from HTTP/1.1 204 No Content format
          STATUS=$(echo "$RESPONSE" | head -1 | grep -oP 'HTTP/[0-9.]+ \K[0-9]+')
          if [ -z "$STATUS" ]; then
            echo "::warning::Failed to extract HTTP status code"
            echo "authorized=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$STATUS" = "204" ]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
            echo "✅ @$USERNAME is a $ORG org member — authorized"
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "⏭️ @$USERNAME is not a $ORG org member — not authorized"
          fi

      - name: Notify unauthorized user
        if: steps.check.outputs.is_agent == 'true' && steps.auth.outputs.authorized == 'false'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.feedback.outputs.pr-number }}
          ROOT_COMMENT_ID: ${{ steps.check.outputs.root_comment_id }}
          AUTHOR: ${{ steps.feedback.outputs.comment-author }}
        run: |

          jq -n \
            --arg body "Sorry @$AUTHOR, conversational replies are currently available to repository collaborators only. Your feedback has still been captured and will be used to improve future reviews.

          <!-- docker-agent-review-reply -->" \
            --argjson reply_to "$ROOT_COMMENT_ID" \
            '{body: $body, in_reply_to: $reply_to}' | \
          gh api "repos/$REPO/pulls/$PR_NUMBER/comments" --input -

      - name: Build thread context
        if: steps.check.outputs.is_agent == 'true' && steps.auth.outputs.authorized == 'true'
        id: thread
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ROOT_ID: ${{ steps.check.outputs.root_comment_id }}
          PR_NUMBER: ${{ steps.feedback.outputs.pr-number }}
          REPO: ${{ github.repository }}
          FILE_PATH: ${{ steps.check.outputs.file_path }}
          LINE: ${{ steps.check.outputs.line }}
          TRIGGER_COMMENT_AUTHOR: ${{ steps.feedback.outputs.comment-author }}
          TRIGGER_COMMENT_ID: ${{ steps.feedback.outputs.comment-id }}
        run: |
          # Fetch the root comment (fail early if the API call errors)
          root=$(gh api "repos/$REPO/pulls/comments/$ROOT_ID") || {
            echo "::error::Failed to fetch root comment $ROOT_ID" >&2
            exit 1
          }
          root_body=$(echo "$root" | jq -r '.body // ""')

          # Fetch all review comments on this PR and filter to this thread.
          # Uses --paginate to handle PRs with >100 review comments.
          # Each page is processed by jq independently, then merged with jq -s.
          # Note: the triggering comment may not appear here due to eventual
          # consistency, so we append it from /tmp/comment_body.txt below.
          all_comments=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/comments" | \
            jq -s --arg root_id "$ROOT_ID" \
            '[.[][] | select((.in_reply_to_id | tostring) == $root_id)] | sort_by(.created_at)') || {
            echo "::error::Failed to fetch thread comments for PR $PR_NUMBER" >&2
            exit 1
          }

          # Build the thread context and save as step output.
          # Use a randomized delimiter to prevent comment body content from
          # colliding with the GITHUB_OUTPUT heredoc terminator.
          DELIM="THREAD_CONTEXT_$(openssl rand -hex 8)"

          {
            echo "prompt<<$DELIM"
            echo "A developer replied to your review comment. Read the thread context below and respond"
            echo "in the same thread."
            echo ""
            echo "---"
            echo "REPO=$REPO"
            echo "PR_NUMBER=$PR_NUMBER"
            echo "ROOT_COMMENT_ID=$ROOT_ID"
            echo "FILE_PATH=$FILE_PATH"
            echo "LINE=$LINE"
            echo ""
            echo "[ORIGINAL REVIEW COMMENT]"
            echo "$root_body"
            echo ""

            # Add earlier replies from the API (excludes the triggering comment
            # to avoid duplication if the API already has it)
            reply_count=$(echo "$all_comments" | jq 'length')
            if [ "$reply_count" -gt 0 ]; then
              for i in $(seq 0 $((reply_count - 1))); do
                comment_id=$(echo "$all_comments" | jq -r ".[$i].id") || continue
                # Skip the triggering comment — we append it from /tmp/comment_body.txt below
                if [ "$comment_id" = "$TRIGGER_COMMENT_ID" ]; then
                  continue
                fi
                author=$(echo "$all_comments" | jq -r ".[$i].user.login") || continue
                body=$(echo "$all_comments" | jq -r ".[$i].body") || continue
                if [ "$author" = "docker-agent" ]; then
                  echo "[YOUR PREVIOUS REPLY by @$author]"
                else
                  echo "[REPLY by @$author]"
                fi
                echo "$body"
                echo ""
              done
            fi

            # Always append the triggering comment last — sourced from /tmp/comment_body.txt
            # (written by the Parse comment context step; safe for multi-line bodies).
            echo "[REPLY by @$TRIGGER_COMMENT_AUTHOR] ← this is the reply you are responding to"
            cat /tmp/comment_body.txt
            echo ""
            echo "$DELIM"
          } >> $GITHUB_OUTPUT

          echo "✅ Built thread context with replies (triggering comment from /tmp/comment_body.txt)"

      - name: Checkout PR head
        if: steps.check.outputs.is_agent == 'true' && steps.auth.outputs.authorized == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.feedback.outputs.pr-number }}/head

      - name: Run reply
        if: steps.check.outputs.is_agent == 'true' && steps.auth.outputs.authorized == 'true'
        continue-on-error: true
        uses: docker/docker-agent-action/review-pr/reply@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0
        with:
          thread-context: ${{ steps.thread.outputs.prompt }}
          comment-id: ${{ steps.feedback.outputs.comment-id }}
          anthropic-api-key: ${{ env.ANTHROPIC_API_KEY_FROM_SSM || secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ env.OPENAI_API_KEY_FROM_SSM || secrets.OPENAI_API_KEY }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          aws-bearer-token-bedrock: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          xai-api-key: ${{ secrets.XAI_API_KEY }}
          nebius-api-key: ${{ secrets.NEBIUS_API_KEY }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}
          github-token: ${{ env.GITHUB_APP_TOKEN || github.token }}
          skip-auth: "true" # Org membership already verified above

      - name: Save feedback artifact
        if: steps.check.outputs.is_agent == 'true'
        shell: bash
        run: |
          # /tmp/reply_comment.json was written by the "Parse comment context" step
          if [ ! -f /tmp/reply_comment.json ]; then
            echo "::warning::No comment JSON available, skipping feedback capture"
            exit 0
          fi
          mkdir -p feedback
          cp /tmp/reply_comment.json feedback/feedback.json
          # Validate it's parseable JSON before uploading
          if ! jq empty feedback/feedback.json 2>/dev/null; then
            echo "::warning::Feedback JSON is malformed, skipping"
            rm -rf feedback
            exit 0
          fi
          echo "📦 Saved feedback data for async processing"

      - name: Upload feedback artifact
        if: steps.check.outputs.is_agent == 'true' && hashFiles('feedback/feedback.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-review-feedback
          path: feedback/
          retention-days: 90

  reply-to-mention:
    needs: [resolve-context]
    if: |
      always() && needs.resolve-context.result != 'failure' && (
        (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@docker-agent') &&
        !startsWith(github.event.comment.body, '/review') &&
        github.event.comment.user.login != 'docker-agent' &&
        github.event.comment.user.type != 'Bot') ||
        (github.event_name == 'pull_request_review_comment' &&
        !github.event.comment.in_reply_to_id &&
        contains(github.event.comment.body, '@docker-agent') &&
        !startsWith(github.event.comment.body, '/review') &&
        github.event.comment.user.login != 'docker-agent' &&
        github.event.comment.user.type != 'Bot') ||
        (needs.resolve-context.result == 'success' &&
        needs.resolve-context.outputs.trigger-event == 'pull_request_review_comment' &&
        needs.resolve-context.outputs.comment-in-reply-to-id == '' &&
        needs.resolve-context.outputs.comment-has-mention == 'true' &&
        needs.resolve-context.outputs.comment-is-review-cmd != 'true' &&
        needs.resolve-context.outputs.comment-author != 'docker-agent' &&
        needs.resolve-context.outputs.comment-author-type != 'Bot')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # download cross-run artifacts

    steps:
      - name: Setup credentials
        uses: docker/docker-agent-action/setup-credentials@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0

      - name: Download trigger context
        if: inputs.trigger-run-id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-review-context
          path: /tmp/context
          run-id: ${{ inputs.trigger-run-id }}
          github-token: ${{ env.GITHUB_APP_TOKEN }}

      - name: Synthesize mention-reply event context
        if: inputs.trigger-run-id != ''
        shell: bash
        run: |
          if [ ! -f /tmp/context/comment.json ]; then
            echo "::warning::comment.json not found in artifact — cannot synthesize mention event"
            exit 0
          fi
          PR_NUMBER=$(cat /tmp/context/pr_number.txt 2>/dev/null || echo '')
          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::pr_number.txt missing or empty — cannot synthesize mention event"
            exit 0
          fi
          PR_HEAD_SHA=$(cat /tmp/context/pr_head_sha.txt 2>/dev/null || echo '')
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_FULL="${GITHUB_REPOSITORY}"
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER}"
          jq -n \
            --slurpfile comment /tmp/context/comment.json \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_head_sha "$PR_HEAD_SHA" \
            --arg repo_name "$REPO_NAME" \
            --arg repo_full_name "$REPO_FULL" \
            --arg repo_owner "$REPO_OWNER" \
            '{
              action: "created",
              pull_request: {
                number: ($pr_number | tonumber),
                head: { sha: $pr_head_sha }
              },
              comment: $comment[0],
              repository: {
                name: $repo_name,
                full_name: $repo_full_name,
                owner: { login: $repo_owner }
              },
              sender: $comment[0].user
            }' > /tmp/mention_event.json
          echo "✅ Synthesized mention-reply event context at /tmp/mention_event.json"

      - name: Resolve event context for mention-reply action
        id: resolve-event
        shell: bash
        run: |
          if [ -f /tmp/mention_event.json ]; then
            echo "path=/tmp/mention_event.json" >> $GITHUB_OUTPUT
            echo "name=pull_request_review_comment" >> $GITHUB_OUTPUT
          else
            echo "path=$GITHUB_EVENT_PATH" >> $GITHUB_OUTPUT
            echo "name=$GITHUB_EVENT_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Run mention-reply handler
        id: mention-context
        if: steps.resolve-event.outputs.path != ''
        uses: docker/docker-agent-action/.github/actions/mention-reply@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0
        env:
          GITHUB_EVENT_PATH: ${{ steps.resolve-event.outputs.path }}
          GITHUB_EVENT_NAME: ${{ steps.resolve-event.outputs.name }}
        with:
          github-token: ${{ env.GITHUB_APP_TOKEN || github.token }}
          org-membership-token: ${{ env.ORG_MEMBERSHIP_TOKEN }}

      - name: Run mention reply
        if: steps.mention-context.outputs.should-reply == 'true'
        id: run-reply
        continue-on-error: true
        uses: docker/docker-agent-action/review-pr/mention-reply@1ef4adee7b9bc09f3d009ed53aad2e6780335d39 # v2.0.0
        with:
          mention-context: ${{ steps.mention-context.outputs.prompt }}
          owner: ${{ steps.mention-context.outputs.owner }}
          repo: ${{ steps.mention-context.outputs.repo }}
          pr-number: ${{ steps.mention-context.outputs.pr-number }}
          is-inline: ${{ steps.mention-context.outputs.is-inline }}
          in-reply-to-id: ${{ steps.mention-context.outputs.in-reply-to-id }}
          anthropic-api-key: ${{ env.ANTHROPIC_API_KEY_FROM_SSM || secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ env.OPENAI_API_KEY_FROM_SSM || secrets.OPENAI_API_KEY }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          aws-bearer-token-bedrock: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          xai-api-key: ${{ secrets.XAI_API_KEY }}
          nebius-api-key: ${{ secrets.NEBIUS_API_KEY }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}
          github-token: ${{ env.GITHUB_APP_TOKEN || github.token }}
          skip-auth: "true"

      - name: Add completion reaction
        if: always() && steps.mention-context.outputs.should-reply == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ env.GITHUB_APP_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          EVENT_COMMENT_ID: ${{ github.event.comment.id }}
          OUTCOME: ${{ steps.run-reply.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$OUTCOME" != "success" ]; then
            exit 0
          fi
          COMMENT_ID="$EVENT_COMMENT_ID"
          if [ -z "$COMMENT_ID" ] && [ -f /tmp/mention_event.json ]; then
            COMMENT_ID=$(jq -r '.comment.id // empty' /tmp/mention_event.json)
          fi
          if [ -z "$COMMENT_ID" ]; then
            echo "::warning::No comment ID available — skipping completion reaction"
            exit 0
          fi
          if [ -f /tmp/mention_event.json ] || [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            gh api "repos/$REPO/pulls/comments/$COMMENT_ID/reactions" \
              -X POST -f content='+1' || true
          else
            gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
              -X POST -f content='+1' || true
          fi
