name: "PR Review Mention Reply"
description: "Replies to @docker-agent mentions in PR/issue comments"
author: "Docker"

inputs:
  mention-context:
    description: "Mention context (PR info + comment body) to respond to"
    required: true
  owner:
    description: "Repository owner extracted from the mention-reply handler"
    required: false
    default: ""
  repo:
    description: "Repository name extracted from the mention-reply handler"
    required: false
    default: ""
  pr-number:
    description: "Pull request number as a string, from the mention-reply handler"
    required: false
    default: ""
  is-inline:
    description: "'true' if the mention was on an inline review comment; 'false' for top-level PR comments"
    required: false
    default: "false"
  in-reply-to-id:
    description: "Comment ID to post the inline reply to (only set when is-inline=true)"
    required: false
    default: ""
  anthropic-api-key:
    description: "Anthropic API key"
    required: false
  openai-api-key:
    description: "OpenAI API key"
    required: false
  google-api-key:
    description: "Google API key for Gemini models"
    required: false
  aws-bearer-token-bedrock:
    description: "AWS Bearer token for Bedrock models"
    required: false
  xai-api-key:
    description: "xAI API key for Grok models"
    required: false
  nebius-api-key:
    description: "Nebius API key"
    required: false
  mistral-api-key:
    description: "Mistral API key"
    required: false
  github-token:
    description: "GitHub token for API access"
    required: false
  skip-auth:
    description: "Skip the built-in authorization check (caller already verified auth)"
    required: false
    default: "false"

outputs:
  agent-outcome:
    description: "Outcome of the mention-reply agent (success/failure/skipped)"
    value: ${{ steps.run-mention-reply.outcome }}

runs:
  using: "composite"
  steps:
    - name: Ensure cache directory exists
      shell: bash
      env:
        WORKSPACE: ${{ github.workspace }}
      run: mkdir -p "$WORKSPACE/.cache"

    - name: Restore reviewer memory
      id: restore-memory
      uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ${{ github.workspace }}/.cache/pr-review-memory.db
        key: pr-review-memory-${{ github.repository }}-mention-reply-${{ github.run_id }}
        restore-keys: |
          pr-review-memory-${{ github.repository }}-mention-reply-
          pr-review-memory-${{ github.repository }}-

    - name: Run mention reply agent
      id: run-mention-reply
      continue-on-error: true
      uses: docker/cagent-action@367a30ddb41e0156459d03750f508eac03f3c38a # v1.5.5
      env:
        ACTION_PATH: ${{ github.action_path }}
      with:
        agent: ${{ env.ACTION_PATH }}/../agents/pr-review-mention-reply.yaml
        prompt: ${{ inputs.mention-context }}
        timeout: "300"
        anthropic-api-key: ${{ inputs.anthropic-api-key }}
        openai-api-key: ${{ inputs.openai-api-key }}
        google-api-key: ${{ inputs.google-api-key }}
        aws-bearer-token-bedrock: ${{ inputs.aws-bearer-token-bedrock }}
        xai-api-key: ${{ inputs.xai-api-key }}
        nebius-api-key: ${{ inputs.nebius-api-key }}
        mistral-api-key: ${{ inputs.mistral-api-key }}
        github-token: ${{ inputs.github-token }}
        skip-auth: ${{ inputs.skip-auth }}

    - name: Post reply
      if: steps.run-mention-reply.outcome == 'success'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        OUTPUT_FILE: ${{ steps.run-mention-reply.outputs.output-file }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr-number }}
        IS_INLINE: ${{ inputs.is-inline }}
        IN_REPLY_TO_ID: ${{ inputs.in-reply-to-id }}
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SECRETS_DETECTED: ${{ steps.run-mention-reply.outputs.secrets-detected }}
      run: node "$ACTION_PATH/../../dist/post-mention-reply.js"
    - name: Save reviewer memory
      if: always() && steps.run-mention-reply.outcome != 'skipped'
      continue-on-error: true
      uses: actions/cache/save@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ${{ github.workspace }}/.cache/pr-review-memory.db
        key: pr-review-memory-${{ github.repository }}-mention-reply-${{ github.run_id }}
